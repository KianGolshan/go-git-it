        d="M13.2 12.5 A1.2 1.2 0 1 1 13.2 12.04"/>
  <!-- G crossbar: center to right opening -->
  <line x1="12" y1="12.5" x2="13.2" y2="12.5"
        stroke="currentColor" stroke-width="0.85" stroke-linecap="round"/>
</svg>
