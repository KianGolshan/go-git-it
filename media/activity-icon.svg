<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Rocket + porthole cutout via evenodd -->
  <path fill="currentColor" fill-rule="evenodd" d="
    M12 2
    C13 5 14.5 8 14.5 10.5
    L14.5 14
    L17 17 L14.5 15.5
    L15 19
    L9 19
    L9.5 15.5 L7 17
    L9.5 14
    L9.5 10.5
    C9.5 8 11 5 12 2 Z
    M10.2 12.5
    A1.8 1.8 0 1 0 13.8 12.5
